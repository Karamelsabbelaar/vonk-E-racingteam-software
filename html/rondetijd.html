<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>E-Kart Laptimer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;600;700&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
</head>
<body>

<nav class="navbar">
  <div class="navbar-inner">
    <a href="index.html" class="nav-logo">
      <img class="logo-light" src="images/Vonk-Logo.png" alt="Vonk">
      <img class="logo-dark"  src="images/Vonk-Logo-dark.png" alt="Vonk">
    </a>

    <div id="sessionInfo" class="session-info">SESSIE INACTIEF</div>

    <button class="hamburger-btn" id="hamburgerBtn" aria-label="Menu openen" aria-expanded="false">
      <span class="hamburger-bar"></span>
      <span class="hamburger-bar"></span>
      <span class="hamburger-bar"></span>
    </button>

  </div>
</nav>
    


  <main class="laptimer-main">

    <!-- HOOFDTIMER -->
    <section class="timer-section">
      <div class="timer-label">RONDETIJD</div>
      <div class="timer-display" id="lapDisplay">00:00.000</div>
      <div class="total-label">TOTAALTIJD <span id="totalDisplay">00:00.000</span></div>

      <div class="lap-info-row">
        <div class="info-box">
          <span class="info-label">RONDE</span>
          <span class="info-value" id="lapNumber">—</span>
        </div>
        <div class="info-box">
          <span class="info-label">BESTE RONDE</span>
          <span class="info-value best" id="bestLap">—</span>
        </div>
        <div class="info-box">
          <span class="info-label">VERSCHIL</span>
          <span class="info-value" id="diffDisplay">—</span>
        </div>
      </div>
    </section>

    <!-- KNOPPEN -->
    <section class="laptimer-controls">
      <button id="btnStart" class="btn btn-start" onclick="startSession()">
        ▶ START SESSIE
      </button>
      <button id="btnLap" class="btn btn-lap" onclick="saveLap()" disabled>
        ⬡ RONDE OPSLAAN
      </button>
      <button id="btnStop" class="btn btn-stop" onclick="stopSession()" disabled>
        ■ STOP SESSIE
      </button>
    </section>

    <!-- RONDETABEL -->
    <section class="table-section">
      <div class="table-header">
        <h2>RONDETIJDEN</h2>
        <button class="btn btn-export" id="btnExport" onclick="exportPDF()" disabled>
          ⬇ EXPORT PDF
        </button>
      </div>

      <div class="table-wrap">
        <table id="lapTable">
          <thead>
            <tr>
              <th>RONDE</th>
              <th>RONDETIJD</th>
              <th>TOTAALTIJD</th>
              <th>VERSCHIL</th>
              <th>STATUS</th>
            </tr>
          </thead>
          <tbody id="lapTableBody">
            <tr class="empty-row">
              <td colspan="5">Nog geen rondes opgeslagen</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>

  </main>

  <script src="js/rondetijd.js"></script>
  <script src="js/supabase.config.js"></script>
  <script src="js/main.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</body>
</html>
