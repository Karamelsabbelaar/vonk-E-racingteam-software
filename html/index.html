<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KartPit — Home</title>
  <link rel="stylesheet" href="css/style.css">
  <script type="module">
    import { supabase } from './js/auth-guard.js';
    window.supabase = supabase;
  </script>


</head>
<body>
<div class="wrapper">

<nav class="navbar">
  <div class="navbar-inner">
    <a href="index.html" class="nav-logo">
      <img src="images/Vonk-Logo.png" alt="Vonk">
    </a>

    <button class="btn btn-ghost" onclick='signOut()'>
      Uitloggen
    </button>

  </div>
</nav>

  <main class="page-content">
    
<br>

    <!-- Quick Nav -->
    <div class="section-header">
      <h2 class="section-title">Quick Access</h2>
    </div>
    <div class="quicknav-grid">
      <a href="tracks.html" class="quicknav-card">
        <div class="quicknav-icon">🚥</div>
        <div class="quicknav-label">Tracks</div>
      </a>
      <a href="pitstop.html" class="quicknav-card">
        <div class="quicknav-icon">⏱️</div>
        <div class="quicknav-label">Pitstop Timer</div>
      </a>
      <a href="agenda.html" class="quicknav-card">
        <div class="quicknav-icon">📋</div>
        <div class="quicknav-label">Race Agenda</div>
      </a>
      <a href="checklist.html" class="quicknav-card">
        <div class="quicknav-icon">✅</div>
        <div class="quicknav-label">Checklist</div>
      </a>
      <a href="handleiding.html" class="quicknav-card">
        <div class="quicknav-icon">📜</div>
        <div class="quicknav-label">Technische Handleiding</div>
      </a>
      <a href="rondetijd.html" class="quicknav-card">
        <div class="quicknav-icon">🕒</div>
        <div class="quicknav-label">Ronde Tijden</div>
      </a>
      <a href="takenlijst.html" class="quicknav-card">
        <div class="quicknav-icon">📋</div>
        <div class="quicknav-label">Takenlijst</div>
      </a>
      <a href="rijdag.html" class="quicknav-card">
        <div class="quicknav-icon">📅</div>
        <div class="quicknav-label">Rijdag schema</div>
      </a>
    </div>

    <!-- Agenda preview -->
    <div class="section-header" style="margin-top:12px">
      <h2 class="section-title">Vandaag</h2>
      <a href="agenda.html" class="btn btn-ghost btn-sm">Alles zien →</a>
    </div>
    <div class="card" style="padding:0;overflow:hidden">
      <table class="data-table">
        <thead><tr><th>Tijd</th><th>Event</th><th>Type</th></tr></thead>
        <tbody id="agenda-preview">
          <tr><td colspan="3" style="color:var(--text3);text-align:center;padding:24px">Laden…</td></tr>
        </tbody>
      </table>
    </div>

  </main>

  <footer class="footer">KartPit &mdash; Amateur Karting Race Manager &mdash; 🏎️</footer>
</div>

<div id="toast-container"></div>

<!-- Supabase SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.config.js"></script>
<script src="js/main.js"></script>
<script>
  const TYPE_BADGE = {
    race: 'badge-red', qualifying: 'badge-yellow',
    session: 'badge-blue', pitstop: 'badge-green'
  };

  async function loadHome() {
    try {
      const [tracks, pitstops, agenda] = await Promise.all([
        Tracks.getAll(), Pitstops.getAll(), Agenda.getAll()
      ]);
      document.getElementById('stat-tracks').textContent   = tracks.length;
      document.getElementById('stat-pitstops').textContent = pitstops.length;
      document.getElementById('stat-events').textContent   = agenda.length;

      const tbody = document.getElementById('agenda-preview');
      if (!agenda.length) {
        tbody.innerHTML = '<tr><td colspan="3" style="color:var(--text3);text-align:center;padding:24px">Geen events</td></tr>';
        return;
      }
      tbody.innerHTML = agenda.slice(0, 5).map(item => `
        <tr>
          <td style="font-family:var(--font-display);font-size:18px;color:var(--text2)">${item.time}</td>
          <td>${item.event}</td>
          <td><span class="badge ${TYPE_BADGE[item.type] || 'badge-gray'}">${item.type}</span></td>
        </tr>`).join('');
    } catch(e) {
      Toast.show('Verbindingsfout: controleer je Supabase instellingen', 'error', 6000);
    }
  }

  document.addEventListener('DOMContentLoaded', loadHome);

</script>

</body>
</html>
