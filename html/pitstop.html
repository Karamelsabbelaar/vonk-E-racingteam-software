<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KartPit — Pitstop Timer</title>
  <link rel="stylesheet" href="css/style.css">  <script type="module">
    import { supabase } from './js/auth-guard.js';
    window.supabase = supabase;
  </script></head>
<body>
<div class="wrapper">

  <nav class="navbar">
    <div class="navbar-inner">
      <a href="index.html" class="nav-logo"><img src="images/Vonk-Logo.png" alt="Vonk"></a>
  </nav>

  <main class="page-content">

    <div class="page-header">
      <div class="eyebrow">Race Tools</div>
      <h1>PITSTOP TIMER</h1>
      <p class="subtitle">Meet & log je pitstop tijden</p>
    </div>

    <div class="card" style="text-align:center;margin-bottom:24px">
      <div id="timer-display" class="timer-display">00:00.00</div>
      <div style="display:flex;align-items:center;gap:12px;justify-content:center;margin-bottom:24px">
        <label class="form-label" for="target-time">Doeltijd (sec):</label>
        <input type="number" id="target-time" placeholder="bijv. 8" step="0.1" min="0" style="width:120px;text-align:center" />
      </div>
      <div class="timer-controls">
        <div class="play-pause-container">
          <button id="btn-start" class="btn btn-red btn-lg btn-play-pause">▶ START</button>
          <button id="btn-stop"  class="btn btn-outline btn-lg btn-play-pause" disabled>⏸ STOP</button>
        </div>
        <button id="btn-reset" class="btn btn-outline btn-lg">↺ RESET</button>
        <button id="btn-save"  class="btn btn-outline btn-lg" disabled>💾 OPSLAAN</button>
      </div>
    </div>

    <div class="stat-grid" style="margin-bottom:32px">
      <div class="card card-green">
        <div class="card-title">Beste Stop</div>
        <div class="card-value" id="stat-best" style="font-size:32px">–</div>
      </div>
      <div class="card card-yellow">
        <div class="card-title">Gemiddeld</div>
        <div class="card-value" id="stat-avg" style="font-size:32px">–</div>
      </div>
      <div class="card card-red">
        <div class="card-title">Slechtste Stop</div>
        <div class="card-value" id="stat-worst" style="font-size:32px">–</div>
      </div>
      <div class="card card-blue">
        <div class="card-title">Totaal Stops</div>
        <div class="card-value" id="stat-count" style="font-size:32px">0</div>
      </div>
    </div>

    <div class="section-header">
      <h2 class="section-title">Stop History</h2>
      <span class="badge badge-green" style="animation:pulse 2s infinite">● LIVE TEAM</span>
    </div>
    <div id="stop-history" class="timer-history"></div>

    <!-- Save Modal -->
    <div id="save-modal" class="modal-overlay">
      <div class="modal">
        <div class="modal-title">💾 Stop Opslaan</div>
        <div class="form-group" style="margin-bottom:16px">
          <label class="form-label">Label</label>
          <input type="text" id="stop-label" placeholder="bijv. Race 1 – Ronde 8 stop" />
        </div>
        <div class="form-group" style="margin-bottom:24px">
          <label class="form-label">Notities</label>
          <textarea id="stop-notes" rows="3" placeholder="Opmerkingen over deze stop…" style="resize:vertical"></textarea>
        </div>
        <div style="display:flex;gap:12px">
          <button id="btn-confirm-save" class="btn btn-red">Opslaan</button>
          <button class="btn btn-outline" data-close-modal>Annuleren</button>
        </div>
      </div>
    </div>

  </main>

  <footer class="footer">KartPit &mdash; Amateur Karting Race Manager &mdash; 🏎️</footer>
</div>

<div id="toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/@capacitor/core@latest/dist/capacitor.js"></script>
<script src="js/supabase.config.js"></script>
<script src="js/notifications.js"></script>
<script src="js/main.js"></script>
<script src="js/timer.js"></script>
</body>
</html>
