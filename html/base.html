<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}KartPit{% endblock %}</title>
  <link rel="stylesheet" href="css/style.css" />
  {% block extra_css %}{% endblock %}
</head>
<body>
<div class="wrapper">

  <!-- Navigation -->
  <nav class="navbar">
    <div class="navbar-inner">
      <a href="index.html" class="nav-logo"><img src="images/Vonk-Logo.png" alt="Vonk"></a>
  </nav>

  <!-- Page Content -->
  <main class="page-content">
    {% block content %}{% endblock %}
  </main>

  <!-- Footer -->
  <footer class="footer">
    KartPit &mdash; Amateur Karting Race Manager &mdash; Built with 🏎️
  </footer>

</div>

<!-- Toast Container -->
<div id="toast-container"></div>

<script src="js/main.js"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
