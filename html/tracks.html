<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KartPit — Tracks</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="wrapper">

  <nav class="navbar">
    <div class="navbar-inner">
      <a href="index.html" class="nav-logo"><img src="../images/Vonk-Logo.png" alt="Vonk"></a>

  </nav>

  <main class="page-content">

    <div class="page-header">
      <div class="eyebrow">Circuit Database</div>
      <h1>TRACKS</h1>
      <p class="subtitle">Kartcircuits met layout notities en rondtijden</p>
    </div>

    <!-- Track toevoegen -->
    <div class="card" style="margin-bottom:40px">
      <h3 class="section-title" style="margin-bottom:16px">Track Toevoegen</h3>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Naam</label>
          <input type="text" id="tr-name" placeholder="bijv. Raceland Lelystad" />
        </div>
        <div class="form-group">
          <label class="form-label">Locatie</label>
          <input type="text" id="tr-loc" placeholder="Stad, Land" />
        </div>
        <div class="form-group" style="max-width:130px">
          <label class="form-label">Lengte (m)</label>
          <input type="number" id="tr-len" placeholder="950" />
        </div>
        <div class="form-group" style="max-width:100px">
          <label class="form-label">Bochten</label>
          <input type="number" id="tr-turns" placeholder="12" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group" style="max-width:140px">
          <label class="form-label">Beste Ronde</label>
          <input type="text" id="tr-lap" placeholder="bijv. 47.2s" />
        </div>
        <div class="form-group" style="max-width:160px">
          <label class="form-label">Type</label>
          <select id="tr-type">
            <option value="outdoor">Buiten</option>
            <option value="indoor">Binnen</option>
            <option value="indoor/outdoor">Binnen/Buiten</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Notities</label>
          <input type="text" id="tr-notes" placeholder="Bochtentips, ondergrond…" />
        </div>
        <div style="display:flex;align-items:flex-end">
          <button onclick="addTrack()" class="btn btn-red">+ Toevoegen</button>
        </div>
      </div>
    </div>

    <div class="tracks-grid" id="tracks-grid">
      <p style="color:var(--text3)">Laden…</p>
    </div>

  </main>

  <footer class="footer">KartPit &mdash; Amateur Karting Race Manager &mdash; 🏎️</footer>
</div>

<div id="toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase.config.js"></script>
<script src="../js/main.js"></script>
</body>
</html>
