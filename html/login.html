<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KartPit — Inloggen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;600;700&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:#ffffff; --bg2:#ececec; --bg3:#ebebeb; --card:#f8f8f8;
      --border:#2a2a3a; --border2:#3a3a50;
      --red:#F8AB21; --red-dim:#ca8c19; --red-glow:#8b6112;
      --yellow:#ffd700; --green:#00c853;
      --text:#E50075; --text2:#9090aa; --text3:#5a5a70;
      --font-display:'Bebas Neue',sans-serif;
      --font-ui:'Barlow Condensed',sans-serif;
      --font-body:'Barlow',sans-serif;
      --radius:4px; --radius-lg:8px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{scroll-behavior:smooth;}
    body{background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:15px;line-height:1.6;min-height:100vh;display:flex;flex-direction:column;}
    a{color:inherit;text-decoration:none;}
    button{cursor:pointer;font-family:var(--font-ui);}
    ::-webkit-scrollbar{width:6px;}
    ::-webkit-scrollbar-track{background:var(--bg);}
    ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}
    ::-webkit-scrollbar-thumb:hover{background:var(--red-dim);}

    /* Navbar */
    .navbar{background:var(--bg2);border-bottom:2px solid var(--red);position:sticky;top:0;z-index:100;box-shadow:0 2px 20px rgba(248,171,33,.15);}
    .navbar-inner{max-width:1200px;margin:0 auto;padding:0 24px;display:flex;align-items:center;height:60px;}
    .nav-logo{font-family:var(--font-display);font-size:28px;letter-spacing:2px;color:var(--red);display:flex;align-items:center;gap:10px;}
    .nav-logo span{color:var(--text);}

    /* Layout */
    .login-wrapper{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 24px;position:relative;overflow:hidden;}
    .login-wrapper::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(-55deg,transparent,transparent 60px,rgba(248,171,33,.03) 60px,rgba(248,171,33,.03) 61px);pointer-events:none;}
    .login-wrapper::after{content:'';position:absolute;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(248,171,33,.06) 0%,transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;}

    /* Card */
    .login-card{background:var(--card);border:1px solid var(--border);border-top:3px solid var(--red);border-radius:var(--radius-lg);padding:48px 40px 40px;width:100%;max-width:440px;position:relative;z-index:1;box-shadow:0 8px 48px rgba(0,0,0,.10);animation:cardIn .35s ease both;}
    .login-card::before{content:'';position:absolute;top:-1px;left:32px;width:48px;height:3px;background:var(--yellow);border-radius:0 0 3px 3px;}
    @keyframes cardIn{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}

    .login-eyebrow{font-family:var(--font-ui);font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--red);margin-bottom:6px;}
    .login-title{font-family:var(--font-display);font-size:48px;letter-spacing:2px;line-height:1;color:var(--text);margin-bottom:4px;}
    .login-subtitle{font-size:13px;color:var(--text2);margin-bottom:36px;}
    .divider-line{border:none;border-top:1px solid var(--border);margin-bottom:28px;}

    /* Form */
    .form-group{display:flex;flex-direction:column;gap:6px;margin-bottom:18px;}
    .form-label{font-family:var(--font-ui);font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);}
    .input-wrap{position:relative;}
    .input-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:15px;color:var(--text3);pointer-events:none;transition:color .2s;}
    .form-input{width:100%;font-family:var(--font-body);background:var(--bg3);color:var(--text);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px 10px 38px;font-size:15px;outline:none;transition:border-color .2s,box-shadow .2s;}
    .form-input:focus{border-color:var(--red);box-shadow:0 0 0 3px rgba(248,171,33,.12);}
    .input-wrap:focus-within .input-icon{color:var(--red);}
    .pw-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text3);font-size:15px;padding:0;transition:color .2s;}
    .pw-toggle:hover{color:var(--red);}

    /* Options */
    .form-options{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:8px;}
    .checkbox-label{display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none;}
    .checkbox-label input[type="checkbox"]{appearance:none;-webkit-appearance:none;width:16px;height:16px;border:1.5px solid var(--border2);border-radius:3px;background:var(--bg3);cursor:pointer;transition:all .2s;position:relative;flex-shrink:0;padding:0;}
    .checkbox-label input[type="checkbox"]:checked{background:var(--red);border-color:var(--red);}
    .checkbox-label input[type="checkbox"]:checked::after{content:'✓';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:10px;font-weight:700;}
    .checkbox-text{font-family:var(--font-ui);font-size:13px;color:var(--text2);}
    .forgot-link{font-family:var(--font-ui);font-size:12px;letter-spacing:1px;text-transform:uppercase;color:var(--text3);transition:color .2s;}
    .forgot-link:hover{color:var(--red);}

    /* Button */
    .btn-login{width:100%;display:flex;align-items:center;justify-content:center;gap:10px;font-family:var(--font-ui);font-size:14px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:13px 20px;border-radius:var(--radius);border:1px solid var(--red);background:var(--red);color:#fff;transition:background .2s,box-shadow .2s,transform .1s;margin-bottom:20px;}
    .btn-login:hover{background:var(--red-dim);box-shadow:0 0 24px var(--red-glow);}
    .btn-login:active{transform:scale(.98);}
    .btn-login:disabled{opacity:.6;cursor:not-allowed;transform:none;}
    .btn-login .arrow{font-size:18px;transition:transform .2s;}
    .btn-login:hover:not(:disabled) .arrow{transform:translateX(4px);}

    /* Alert */
    .alert{display:none;align-items:center;gap:10px;padding:12px 14px;border-radius:var(--radius);margin-bottom:20px;font-family:var(--font-ui);font-size:13px;letter-spacing:.5px;}
    .alert.visible{display:flex;animation:slideIn .25s ease;}
    .alert.error{background:rgba(229,0,117,.08);border-left:3px solid #E50075;color:var(--text);}
    .alert.success{background:rgba(0,200,83,.08);border-left:3px solid var(--green);color:#1a6633;}
    @keyframes slideIn{from{opacity:0;transform:translateX(-8px);}to{opacity:1;transform:translateX(0);}}

    /* Error text */
    .form-error{font-family:var(--font-ui);font-size:12px;color:#ff4d6a;margin-top:5px;display:none;}
    .form-error.visible{display:block;}

    /* Footer */
    .footer{background:var(--bg2);border-top:1px solid var(--border);padding:20px 24px;text-align:center;font-size:12px;color:var(--text3);font-family:var(--font-ui);letter-spacing:1.5px;text-transform:uppercase;}

    /* Responsive */
    @media(max-width:768px){.login-card{padding:40px 32px 32px;max-width:480px;}.login-title{font-size:42px;}}
    @media(max-width:480px){.login-card{padding:32px 20px 28px;border-radius:var(--radius);}.login-title{font-size:36px;}.form-options{flex-direction:column;align-items:flex-start;}}
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="navbar-inner">
      <a class="nav-logo" href="#">🏁 KART<span>PIT</span></a>
    </div>
  </nav>

  <div class="login-wrapper">
    <div class="login-card">

      <div class="alert" id="alertBanner">
        <span id="alertIcon">⚠</span>
        <span id="alertText"></span>
      </div>

      <p class="login-eyebrow">KartPit Portaal</p>
      <h1 class="login-title">INLOGGEN</h1>
      <p class="login-subtitle">Voer je gegevens in om door te gaan</p>
      <hr class="divider-line" />

      <form id="loginForm" novalidate>

        <div class="form-group">
          <label class="form-label" for="email">E-mailadres</label>
          <div class="input-wrap">
            <input class="form-input" type="email" id="email" placeholder="naam@kartpit.nl" autocomplete="email" required />
            <span class="input-icon">✉</span>
          </div>
          <span class="form-error" id="emailError">Voer een geldig e-mailadres in.</span>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Wachtwoord</label>
          <div class="input-wrap">
            <input class="form-input" type="password" id="password" placeholder="••••••••" autocomplete="current-password" required />
            <span class="input-icon">🔒</span>
            <button type="button" class="pw-toggle" id="pwToggle">👁</button>
          </div>
          <span class="form-error" id="passwordError">Wachtwoord mag niet leeg zijn.</span>
        </div>

        <div class="form-options">
          <label class="checkbox-label">
            <input type="checkbox" id="remember" />
            <span class="checkbox-text">Onthoud mij</span>
          </label>
          <a class="forgot-link" href="#">Wachtwoord vergeten?</a>
        </div>

        <button type="submit" class="btn-login" id="submitBtn">
          INLOGGEN <span class="arrow">→</span>
        </button>

      </form>

    </div>
  </div>

  <footer class="footer">&copy; 2025 KartPit — Amateur Karting Companion</footer>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

    // ── CONFIG — vervang met jouw Supabase gegevens ──────────
    const SUPABASE_URL  = 'https://jouw-project.supabase.co';
    const SUPABASE_ANON = 'jouw-anon-public-key';
    // ─────────────────────────────────────────────────────────

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON);

    // Redirect if already logged in
    const { data: { session } } = await supabase.auth.getSession();
    if (session) window.location.href = 'index.html';

    // UI refs
    const form          = document.getElementById('loginForm');
    const emailInput    = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const emailError    = document.getElementById('emailError');
    const passwordError = document.getElementById('passwordError');
    const alertBanner   = document.getElementById('alertBanner');
    const alertText     = document.getElementById('alertText');
    const alertIcon     = document.getElementById('alertIcon');
    const submitBtn     = document.getElementById('submitBtn');
    const pwToggle      = document.getElementById('pwToggle');

    // Password toggle
    pwToggle.addEventListener('click', () => {
      const show = passwordInput.type === 'password';
      passwordInput.type = show ? 'text' : 'password';
      pwToggle.textContent = show ? '🙈' : '👁';
    });

    function showAlert(msg, type = 'error') {
      alertBanner.className = `alert ${type} visible`;
      alertIcon.textContent = type === 'error' ? '⚠' : '✓';
      alertText.textContent = msg;
    }

    function clearErrors() {
      emailError.classList.remove('visible');
      passwordError.classList.remove('visible');
      alertBanner.className = 'alert';
    }

    emailInput.addEventListener('input', () => emailError.classList.remove('visible'));
    passwordInput.addEventListener('input', () => passwordError.classList.remove('visible'));

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearErrors();

      let valid = true;
      const email = emailInput.value.trim();
      const password = passwordInput.value;

      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        emailError.classList.add('visible');
        valid = false;
      }
      if (!password) {
        passwordError.classList.add('visible');
        valid = false;
      }
      if (!valid) return;

      submitBtn.disabled = true;
      submitBtn.innerHTML = 'BEZIG...';

      const { data, error } = await supabase.auth.signInWithPassword({ email, password });

      submitBtn.disabled = false;
      submitBtn.innerHTML = 'INLOGGEN <span class="arrow">→</span>';

      if (error) {
        showAlert('Onjuiste gegevens. Probeer opnieuw.', 'error');
        return;
      }

      // Check role in profiles table
      const { data: profile } = await supabase
        .from('profiles')
        .select('role')
        .eq('id', data.user.id)
        .single();

      showAlert('Ingelogd! Je wordt doorgestuurd…', 'success');

      setTimeout(() => {
        if (profile?.role === 'admin') {
          window.location.href = 'admin.html';
        } else {
          window.location.href = 'index.html';
        }
      }, 800);
    });
  </script>
</body>
</html>
